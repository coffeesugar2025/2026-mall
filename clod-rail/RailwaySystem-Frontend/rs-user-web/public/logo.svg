<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 方形背景 -->
  <rect width="512" height="512" fill="#1890ff" rx="64"/>
  
  <!-- 字母 RS 顶部 -->
  <text 
    x="256" 
    y="140" 
    fill="white" 
    font-family="Arial, sans-serif" 
    font-size="80" 
    font-weight="bold" 
    text-anchor="middle"
  >
    RS
  </text>
  
  <!-- 火车车头主体 -->
  <g transform="translate(126, 180)">
    <!-- 车头外轮廓 -->
    <path 
      d="M30 0 L230 0 C245 0 260 15 260 30 L260 140 C260 155 245 170 230 170 L30 170 C15 170 0 155 0 140 L0 30 C0 15 15 0 30 0 Z" 
      fill="white"
    />
    
    <!-- 车窗左 -->
    <rect x="40" y="35" width="70" height="50" rx="8" fill="#1890ff"/>
    <!-- 车窗右 -->
    <rect x="150" y="35" width="70" height="50" rx="8" fill="#1890ff"/>
    
    <!-- 车灯左 -->
    <circle cx="65" cy="130" r="15" fill="#FFD700"/>
    <!-- 车灯右 -->
    <circle cx="195" cy="130" r="15" fill="#FFD700"/>
    
    <!-- 车头装饰线 -->
    <line x1="40" y1="100" x2="220" y2="100" stroke="#1890ff" stroke-width="5"/>
    
    <!-- 车轮左 -->
    <circle cx="60" cy="170" r="20" fill="#595959"/>
    <circle cx="60" cy="170" r="10" fill="#262626"/>
    
    <!-- 车轮右 -->
    <circle cx="200" cy="170" r="20" fill="#595959"/>
    <circle cx="200" cy="170" r="10" fill="#262626"/>
  </g>
  
  <!-- 铁轨 -->
  <g transform="translate(80, 380)">
    <!-- 上轨道 -->
    <rect x="0" y="0" width="352" height="8" rx="4" fill="white" opacity="0.9"/>
    <!-- 下轨道 -->
    <rect x="0" y="24" width="352" height="8" rx="4" fill="white" opacity="0.9"/>
    
    <!-- 枕木 -->
    <rect x="20" y="-8" width="8" height="48" fill="white" opacity="0.7" rx="2"/>
    <rect x="70" y="-8" width="8" height="48" fill="white" opacity="0.7" rx="2"/>
    <rect x="120" y="-8" width="8" height="48" fill="white" opacity="0.7" rx="2"/>
    <rect x="170" y="-8" width="8" height="48" fill="white" opacity="0.7" rx="2"/>
    <rect x="220" y="-8" width="8" height="48" fill="white" opacity="0.7" rx="2"/>
    <rect x="270" y="-8" width="8" height="48" fill="white" opacity="0.7" rx="2"/>
    <rect x="320" y="-8" width="8" height="48" fill="white" opacity="0.7" rx="2"/>
  </g>
  
  <!-- 速度线条效果 -->
  <g opacity="0.5">
    <line x1="50" y1="270" x2="90" y2="270" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="295" x2="85" y2="295" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="50" y1="320" x2="95" y2="320" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>
</svg>

