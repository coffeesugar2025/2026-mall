# 本文件为示例配置：复制为 bootstrap-dev.yaml 后替换占位符
# 注意：bootstrap-dev.yaml 已被 .gitignore 忽略，不应提交到仓库

rs:
  auth:
    exclude:
      paths:
        - /customer/auth/**
        - /admin/auth/**
        - /doc.html
        - /v3/api-docs/**
        - /swagger-resources/**
        - /webjars/**

spring:
  cloud:
    nacos:
      server-addr: localhost:8848
      discovery:
        namespace: <NACOS_NAMESPACE_ID>
      config:
        namespace: <NACOS_NAMESPACE_ID>
# 可选：如果你把 redis 也放在 Nacos shared-redis.yaml，则这里无需重复
# rs:
#   redis:
#     host: localhost
#     port: 6379
#     password: <REDIS_PASSWORD>
