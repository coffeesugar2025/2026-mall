spring:
  application:
    name: user-service
  # 指定运行环境
  profiles:
    active: dev
  cloud:
    nacos:
      server-addr: localhost:8848
      config:
        namespace: 83a90920-a536-4767-b536-3e99c506b1a0
        file-extension: yaml
      discovery:
        namespace: 83a90920-a536-4767-b536-3e99c506b1a0
        enabled: true
  config:
    import:
      - nacos:shared-mysql.yaml
      - nacos:shared-knife4j.yaml
      - nacos:shared-redis.yaml

rs:
  auth:
    jwt-key: ${RS_AUTH_JWT_KEY}
    refresh-cookie-secure: ${RS_AUTH_REFRESH_COOKIE_SECURE:false}

server:
  port: 18081
