# 本文件为示例配置：复制为 bootstrap-dev.yaml 后替换占位符
# 注意：bootstrap-dev.yaml 已被 .gitignore 忽略，不应提交到仓库

rs:
  mysql:
    db-name: rs-assistant
    host: localhost
    port: 3306
    username: root
    password: <MYSQL_PASSWORD>

  redis:
    host: localhost
    port: 6379
    password: <REDIS_PASSWORD>
    timeout: 2000
    database: 1

  rabbitmq:
    host: localhost
    port: 5672
    username: <RABBITMQ_USERNAME>
    password: <RABBITMQ_PASSWORD>
    virtual-host: /rs

  ai:
    ali-api-key: <AI_API_KEY>
    chat-model-name: <AI_CHAT_MODEL_NAME>
    stream-model-name: <AI_STREAM_MODEL_NAME>
    embedding-model-name: <AI_EMBEDDING_MODEL_NAME>

  knife4j:
    title: 客服服务
    description: 客服服务接口文档
    version: 1.0.0
    contact:
      name: <CONTACT_NAME>
      url: <CONTACT_URL>
      email: <CONTACT_EMAIL>

  openapi:
    groups:
      - groupName: 用户端-客服服务
        matchPath:
          - com.rs.controller.user

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
